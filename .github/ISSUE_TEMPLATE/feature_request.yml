name: ✨ Feature Request
description: Suggest an idea or improvement for II-Researcher
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe the problem you're trying to solve — not just the solution — so we can find the best approach together.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve? What's currently difficult or impossible?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you've considered.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that helps us understand the request (links, screenshots, examples).
